services:
  api:
    env_file:
      - ./api/.env
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: stride_lab_api
    ports:
      - "8000:8000"
    networks:
      - stride-lab-net
    depends_on:
      - mariadb
      - redis
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: stride_lab_client
    ports:
      - "3000:3000"
    networks:
      - stride-lab-net
    depends_on:
      - api
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules

  mariadb:
    image: mariadb:10.6.16
    container_name: stride_lab_mariadb
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - stride-lab-net

  redis:
    image: redis:6
    container_name: stride_lab_redis
    ports:
      - "6379:6379"
    networks:
      - stride-lab-net

networks:
  stride-lab-net:
    driver: bridge

volumes:
  mariadb-data:
